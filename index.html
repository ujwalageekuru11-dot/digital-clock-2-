<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clock-card">
            <h1>Digital Clock - Indian Standard Time</h1>
            <div id="time" class="time">21:08:30</div>
            <div id="date" class="date">05/02/2026</div>
            <button id="toggle-btn">Switch to 24-hour format</button>
        </div>
    </div>
    <script src="script.js"></script>
    </body>
</html>
